<script>
        // Unlock audio on first click

        let equippedPickaxe = "T0";
        let ownedGears = [];
        let equippedGears = [];

        let luckArtefactLevel = 0;
        let pauseOnChill = false;
        let waitingForManualHighOre = false;
        let totalBlocksMined = 0;
        let globalBlocksMined = 0;
        let artefactInterval = null;
        let sortRarestFirst = false; // false = Common → Rarest, true = Rarest → Common
        let audioEnabled = false;
        let spawnLock = false;
		let compactNumbers = false;
		let recentFinds = [];
		let volumeLevels = [1, 0.75, 0.5, 0.25, 0.05, 0];
		let currentVolumeIndex = 0;
		let spawnMessagesEnabled = true;
		let spawnSoundFilter = "Exotic"; // default = hear all
		let blocksMined = 0;
		let activeCave = null;
		let caveEndAt = 0;
		let lastCaveEndAt = 0;
		const CAVE_INTERVAL = 100000;   // 100k blocks
		const CAVE_DURATION = 25000;     // lasts 25k blocks
		let currentEvent = null;
const events = ["space", "ocean", "nuclear", "fire", "evolie", "computer", "mlp", "terraria"];

function startEventSystem() {
    const eventBox = document.getElementById("eventBox");

    // Initially no event
    eventBox.innerText = "No event active";

    // Start event rotation almost immediately
    setTimeout(() => {
        rotateEvent(); // first event

        setInterval(() => {
            rotateEvent(); // rotate every 5 minutes
        }, 300000); // 300000ms = 5min
    }, 500);
}
const mutations = [
    { name: "Inverted",    chance: 1/100,       multi: 100       },
    { name: "Glitched",    chance: 1/500,        multi: 500       },
    { name: "Voidtouched", chance: 1/1000,       multi: 1000      },
    { name: "Celestial",   chance: 1/5000,       multi: 5000      },
    { name: "Fractured",   chance: 1/15000,      multi: 15000     },
    { name: "Decayed",     chance: 1/50000,      multi: 50000     },
    { name: "Spectral",    chance: 1/150000,     multi: 150000    },
    { name: "Primordial",  chance: 1/500000,     multi: 500000    },
    { name: "Omnipotent",  chance: 1/2000000,    multi: 2000000   }
];
// Plafonds max atteints uniquement avec T10
const mutationCaps = {
    "Inverted":    1/50,
    "Glitched":    1/250,
    "Voidtouched": 1/500,
    "Celestial":   1/2500,
    "Fractured":   1/7500,
    "Decayed":     1/25000,
    "Spectral":    1/75000,
    "Primordial":  1/250000,
    "Omnipotent":  1/1000000
};

function rollMutation(oreName, pickaxe = "T0") {
    const data = oreData[oreName];
    if (!data) return null;

    // Scale T7→T10 : T7 = 0% bonus, T10 = 100% du bonus (plafond)
    const pickaxeTiers = { "T7": 0, "T8": 0.33, "T9": 0.66, "T10": 1.0 };
    const scale = pickaxeTiers[pickaxe] ?? 0; // avant T7 = 0

    for (let mut of mutations) {
        const cap = mutationCaps[mut.name] || mut.chance;
        const boostedChance = mut.chance + (cap - mut.chance) * scale;
        if (Math.random() < boostedChance) {
            return mut;
        }
    }

    return null;
}
function rotateEvent() {
    let newEvent;
    do {
        newEvent = events[Math.floor(Math.random() * events.length)];
    } while (newEvent === currentEvent);

    currentEvent = newEvent;

    const eventBox = document.getElementById("eventBox");

    const displayNames = {
        space: "Strange distortions ripple overhead",
        ocean: "A distant tide can be felt",
        nuclear: "The air vibrates faintly",
        fire: "The temperature rises unnaturally",
        evolie: "Something is evolving",
        computer: "The system behaves… differently",
		mlp: "Something magical gallops through the air",
		terraria: "The world shifts into a harder state"
    };

    // Reset class first
    eventBox.className = "event-box event-text";

    // Add event-specific color class
    switch (currentEvent) {
        case "space": eventBox.classList.add("event-space"); break;
        case "ocean": eventBox.classList.add("event-ocean"); break;
        case "nuclear": eventBox.classList.add("event-nuclear"); break;
        case "fire": eventBox.classList.add("event-fire"); break;
        case "evolie": eventBox.classList.add("event-evolie"); break;
        case "computer": eventBox.classList.add("event-computer"); break;
		case "mlp": eventBox.classList.add("event-mlp"); break;
		case "terraria": eventBox.classList.add("event-terraria"); break;
    }

    eventBox.innerText = displayNames[currentEvent];
}
function exportSave() {
    const saveData = JSON.stringify({
        inventory,
        ownedPickaxes,
        equippedPickaxe,
        ownedGears,
        equippedGears,
        artefactLevel,
        luckArtefactLevel,
        pauseOnChill,
        waitingForManualHighOre,
        currentVolumeIndex
    }, null, 2); // pretty-print JSON

    const blob = new Blob([saveData], { type: "application/json" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "MiningRNGSimulator_save.json"; // filename
    a.click();

    URL.revokeObjectURL(url);
    alert("Save exported!");
}
function importSave() {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".json";

    input.onchange = (event) => {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);

                // Apply the loaded data
                inventory = data.inventory || {};
                ownedPickaxes = data.ownedPickaxes || ["T0"];
                equippedPickaxe = data.equippedPickaxe || "T0";
                ownedGears = data.ownedGears || [];
                equippedGears = data.equippedGears || [];
                artefactLevel = data.artefactLevel || 0;
                luckArtefactLevel = data.luckArtefactLevel || 0;
                pauseOnChill = data.pauseOnChill || false;
                waitingForManualHighOre = data.waitingForManualHighOre || false;
                currentVolumeIndex = data.currentVolumeIndex ?? 0;

                sanitizeInventory();
                updateCaveUI(); // Refresh UI immediately
                alert("Save imported successfully!");
            } catch (err) {
                alert("Invalid save file!");
                console.error(err);
            }
        };
        reader.readAsText(file);
    };

    input.click();
}

function checkForCaveSpawn() {
    if (activeCave) return; // cave already active

    // Blocks mined since last cave ended
    const blocksSinceLastCave = blocksMined - lastCaveEndAt;
    if (blocksSinceLastCave < CAVE_INTERVAL) return;

    const caveKeys = Object.keys(caveTypes);

    for (let i = 0; i < caveKeys.length; i++) {
        const caveKey = caveKeys[i];
        const cave = caveTypes[caveKey];

        if (Math.random() < cave.rareChance) {
            activeCave = cave;
            activeCave.startTime = Date.now();
            caveEndAt = blocksMined + CAVE_DURATION;
            return;
        }
    }
}

// Helper to format numbers compactly
	function formatNumber(n) {
		if (!compactNumbers) return n.toLocaleString();
		if (n >= 1e303) return (n / 1e303).toFixed(2) + "Ct";  // Centillion
		if (n >= 1e100) return (n / 1e100).toFixed(2) + "Gg";  // Googol
		if (n >= 1e63)  return (n / 1e63).toFixed(2)  + "Vi";  // Vigintillion
		if (n >= 1e60)  return (n / 1e60).toFixed(2)  + "NV";  // Novemdecillion
		if (n >= 1e57)  return (n / 1e57).toFixed(2)  + "OV";  // Octodecillion
		if (n >= 1e54)  return (n / 1e54).toFixed(2)  + "SpV"; // Septendecillion
		if (n >= 1e51)  return (n / 1e51).toFixed(2)  + "SxV"; // Sexdecillion
		if (n >= 1e48)  return (n / 1e48).toFixed(2)  + "QnV"; // Quindecillion
		if (n >= 1e45)  return (n / 1e45).toFixed(2)  + "QdV"; // Quattuordecillion
		if (n >= 1e42)  return (n / 1e42).toFixed(2)  + "TV";  // Tredecillion
		if (n >= 1e39)  return (n / 1e39).toFixed(2)  + "DV";  // Duodecillion
		if (n >= 1e36)  return (n / 1e36).toFixed(2)  + "Ud";  // Undecillion
		if (n >= 1e33)  return (n / 1e33).toFixed(2)  + "Dc";  // Decillion
		if (n >= 1e30)  return (n / 1e30).toFixed(2)  + "No";  // Nonillion
		if (n >= 1e27)  return (n / 1e27).toFixed(2)  + "Oc";  // Octillion
		if (n >= 1e24)  return (n / 1e24).toFixed(2)  + "Sp";  // Septillion
		if (n >= 1e21)  return (n / 1e21).toFixed(2)  + "Sx";  // Sextillion
		if (n >= 1e18)  return (n / 1e18).toFixed(2)  + "Qn";  // Quintillion
		if (n >= 1e15)  return (n / 1e15).toFixed(2)  + "QD";  // Quadrillion
		if (n >= 1e12)  return (n / 1e12).toFixed(2)  + "T";   // Trillion
		if (n >= 1e9)   return (n / 1e9).toFixed(2)   + "B";   // Billion
		if (n >= 1e6)   return (n / 1e6).toFixed(2)   + "M";   // Million
		if (n >= 1e3)   return (n / 1e3).toFixed(1)   + "K";   // Thousand
		return n.toString();
	}

       function playSpawnSound(ore) {
    if (!spawnMessagesEnabled) return;
    if (spawnLock) return;

    const data = oreData[ore];
    if (!data || !data.spawnMsg) return;

    spawnLock = true;

    const msgDiv = document.getElementById("spawnMessage");
    msgDiv.innerText = data.spawnMsg;
	msgDiv.classList.remove("event-text");
    msgDiv.style.color = rarityColors[data.rarity] || "#ffffff";
    msgDiv.style.display = "block";

    let audioId = null;
	// Custom per-ore sound override
if (data.customSound) {
    audioId = data.customSound;
}
    // Special mapping for cave-exclusive and unique ores
    const specialRaritySounds = {
        "IceCaveExclusive-Exotic": "Achillgoesdownyourspine",
        "EnergyCaveExclusive-Exquisite": "Yourheartskipsabeat",
        "EnergyCaveExclusive-Zenith": "Zenith",
        "NuclearCaveExclusive-Transcendent": "Transcendent",
        "ShadowCaveExclusive-Enigmatic": "Enigmatic",
        "ShadowCaveExclusive-Imaginary": "Imaginary",
        "AbyssCaveExclusive-Unfathomable": "Unfathomable",
        "AbyssCaveExclusive-Zenith": "Zenith",
        "LavaCaveExclusive-Otherworldly": "Otherworldly",
        "CaveExclusive-Mythical": "Otherworldly",
        "CaveExclusive-Eternal": "Eternal",
		"IceCaveExclusive-Eternal": "Eternal",
		"LavaCaveExclusive-Eternal": "EpineAudio"
    };

    // Only assign rarity-based sound if no custom sound was set
if (!audioId) {

    if (specialRaritySounds[data.rarity]) {
        audioId = specialRaritySounds[data.rarity];
    } else {

        const exact = data.exact;

        if (exact >= 250000 && exact < 10000000) audioId = "Achillgoesdownyourspine";
        else if (exact >= 10000000 && exact < 25000000) audioId = "Yourheartskipsabeat";
        else if (exact >= 25000000 && exact < 60000000) audioId = "Transcendent";
        else if (exact >= 60000000 && exact < 100000000) audioId = "Enigmatic";
        else if (exact >= 100000000 && exact < 295000000) audioId = "Unfathomable";
        else if (exact >= 295000000 && exact < 1000000000) audioId = "Otherworldly";
        else if (exact >= 1000000000 && exact < 50000000000) audioId = "Imaginary";
        else if (exact >= 50000000000 && exact < 1000000000000) audioId = "Zenith";
        else if (exact >= 1000000000000) audioId = "Eternal";
    }
}
    function unlock() {
        msgDiv.style.display = "none";
        spawnLock = false;
    }

    if (!audioEnabled || !audioId) {
        setTimeout(unlock, 5000);
        return;
    }

    const audio = document.getElementById(audioId);
    if (!audio) { setTimeout(unlock, 5000); return; }

    audio.pause();
    audio.currentTime = 0;

    audio.play().then(() => {

        /* =========================
           🔥 ETERNAL EFFECT
        ========================== */
        if (data.rarity === "Eternal" || data.rarity === "SPAFF"|| data.rarity === "CaveExclusive-Eternal"|| data.rarity === "LavaCaveExclusive-Eternal"|| data.rarity === "IceCaveExclusive-Eternal") {
            const overlay = document.getElementById("spawnEffect");

            setTimeout(() => {
                overlay.style.transition = "background 5s linear";

            }, 50);

            setTimeout(() => {
                overlay.style.transition = "background 5s linear";
                overlay.style.background = "rgba(100,100,100,0.7)";
            }, 5050);

            audio.onended = () => {
                overlay.style.transition = "background 1s linear";
                overlay.style.background = "transparent";
                unlock();
            };
            return;
        }

        /* =========================
           🌌 ZENITH EFFECT
        ========================== */
        if (data.rarity === "Zenith"|| data.rarity === "AbyssCaveExclusive-Zenith"|| data.rarity === "EnergyCaveExclusive-Zenith") {
            const numDivs = 5;
            const spawnDivs = [];

            function isOverlapping(x, y, size = 150) {
                return spawnDivs.some(d =>
                    Math.abs(d.x - x) < size &&
                    Math.abs(d.y - y) < size
                );
            }

            for (let i = 0; i < numDivs; i++) {
                let x, y, attempts = 0;
                do {
                    x = Math.random() * (window.innerWidth - 200) + 50;
                    y = Math.random() * (window.innerHeight - 200) + 50;
                    attempts++;
                } while (isOverlapping(x, y) && attempts < 20);

                const div = document.createElement("div");
                div.innerText = data.spawnMsg;
                div.style.position = "fixed";
                div.style.left = x + "px";

                div.style.fontSize = "24px";

                document.body.appendChild(div);

            let angle = 0;
            const spinInterval = setInterval(() => {
                angle += 5;
                spawnDivs.forEach(d =>
                    d.div.style.transform = `rotate(${angle}deg)`
                );
            }, 50);

            audio.onended = () => {
                clearInterval(spinInterval);
                spawnDivs.forEach(d => d.div.remove());
                unlock();
            };
            return;
        }

        /* =========================
           🌠 IMAGINARY EFFECT

        if (data.rarity === "Imaginary"|| data.rarity === "ShadowCaveExclusive-Imaginary") {

            block.style.pointerEvents = "none";

            block.style.background = "transparent";

            const img = oreImages[ore];
            if (img) {
                img.style.width = "100%";
                img.style.height = "100%";
                img.style.objectFit = "contain";
                block.appendChild(img.cloneNode());
            } else {
                block.style.background = data.color;
                const span = document.createElement("span");
                span.innerText = data.symbol || "";
                span.style.fontSize = "70px";
                span.style.fontWeight = "bold";
                span.style.color = data.symbolColor || "#fff";
                block.appendChild(span);
            }

            document.body.appendChild(block);

            audio.onended = () => {
                block.remove();
                unlock();
            };
            return;
        }

const eventData = getEventText(); // Should return currentEvent + display text

if (

function updateRecentFind(ore) {
    const baseName = ore.split(" [")[0];
    const mutName = ore.includes(" [") ? ore.replace(/^.*\[(.+)\]$/, "$1") : null;
    const data = oreData[baseName] || oreData[ore];
    if (!data) return;

    const mut = mutName ? mutations.find(m => m.name === mutName) : null;
    const effectiveExact = mut ? data.exact * mut.multi : data.exact;

    // Seuil 250k sur la valeur effective (avec ou sans mutation)
    if (effectiveExact < 250000) return;

    const mc = mutName ? (mutationColors[mutName] || "#ff00ff") : null;

    recentFinds.unshift({
        baseName,
        rarity: data.rarity,
        exact: effectiveExact,
        color: data.color,
        symbol: data.symbol || "",
        mutName,
        mc
    });

    recentFinds = recentFinds.slice(0, 5);

    const div = document.getElementById("recentFindContent");
    div.innerHTML = "";

    recentFinds.forEach(f => {
        const fDiv = document.createElement("div");
        fDiv.style.display = "flex";
        fDiv.style.alignItems = "center";
        fDiv.style.marginBottom = "6px";

        const box = document.createElement("div");
        box.style.width = "24px";
        box.style.height = "24px";
        box.style.marginRight = "6px";
        box.style.display = "flex";
        box.style.alignItems = "center";
        box.style.justifyContent = "center";
        box.style.fontWeight = "bold";
        box.style.flexShrink = "0";

        if (oreImages[f.baseName]) {
            const img = oreImages[f.baseName].cloneNode();
            img.style.width = "24px";
            img.style.height = "24px";
            if (f.mc) img.style.outline = `2px solid ${f.mc}`;
            box.appendChild(img);
        } else {
            box.style.background = f.color;
            box.style.color = "#fff";
            if (f.mc) box.style.outline = `2px solid ${f.mc}`;
            box.innerText = f.symbol;
        }

        const mutLabel = f.mc
            ? ` <span style="color:${f.mc};font-weight:bold">[${f.mutName}]</span>`
            : "";

        const text = document.createElement("div");
        text.innerHTML = `${f.baseName}${mutLabel} (${f.rarity}) - 1 in ${formatNumber(f.exact)}`;
        text.style.fontSize = "14px";
        text.style.flex = "1";

        fDiv.appendChild(box);
        fDiv.appendChild(text);
        div.appendChild(fDiv);
    });
}

function generateGrid(){
    grid = [];

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = "40px Arial";

    for (let y = 0; y < GRID; y++) {
        for (let x = 0; x < GRID; x++) {
            let ore = grid[y][x];
            const data = oreData[ore];

            // If there’s an image for the ore, draw it
            if (oreImages[ore]) {
                ctx.drawImage(oreImages[ore], x * SIZE, y * SIZE, SIZE - 2, SIZE - 2);
            } else {
                ctx.fillStyle = data.color;
                ctx.fillRect(x * SIZE, y * SIZE, SIZE - 2, SIZE - 2);
                if (data.symbol) {
                    ctx.fillStyle = data.symbolColor || "#fff";
                    ctx.fillText(data.symbol, x * SIZE + SIZE / 2, y * SIZE + SIZE / 2);
                }
            }
        }
    }
}

        case "T6": localLuckMultiplier *= 5; break;

        }
    });

    // Full total luck multiplier (artefact + gear + pickaxe)
    let totalLuck = 1 + (luckArtefactLevel || 0);  // artefact luck
    totalLuck *= localLuckMultiplier;              // gear + pickaxe luck

    // Reduce total luck in caves (example: 1000×)
    totalLuck = 1 + (totalLuck - 1) / 1000;

    for (const ore of validExclusiveOres) {
        const data = oreData[ore];
        let chance = 1 / data.exact;

        // Apply the reduced total luck
        chance *= totalLuck;

            return ore;
        }
    }
}

        // Cave blocks (filtered by current event)
        const validCaveBlocks = getValidOres(activeCave.caveBlocks, currentEvent);

        if (validCaveBlocks.length > 0) {
            return validCaveBlocks[Math.floor(Math.random() * validCaveBlocks.length)];
        }

        return "Stone";
    }


    // ===== Normal World =====

    const allOres = Object.keys(oreData).filter(
        ore => !oreData[ore].rarity.includes("CaveExclusive")
    );

    const availableOres = getValidOres(allOres, currentEvent);

    if (!availableOres.length) return "Stone";


    // Weighted random with luck (normal world)
    const weights = availableOres.map(ore => {

        const data = oreData[ore];
        let baseChance = 1 / data.exact;

        // Apply luck only to rare ores
        if (luckArtefactLevel > 0 && data.exact >= 1000) {

            const maxLevel = 60;
            const maxMultiplier = 10;

            const scaleFactor =
                1 +
                (Math.log10(luckArtefactLevel + 1) /
                    Math.log10(maxLevel + 1)) *
                (maxMultiplier - 1);

            baseChance *= scaleFactor;
        }

        return baseChance;
    });

    const totalWeight = weights.reduce((sum, w) => sum + w, 0);
    let random = Math.random() * totalWeight;

    for (let i = 0; i < availableOres.length; i++) {

        random -= weights[i];

        if (random <= 0) {

            const selectedOre = availableOres[i];

            if (
                oreData[selectedOre].exact >= 250000 &&
                oreData[selectedOre].spawnMsg
            ) {
                setTimeout(() => tryPlaySpawnSound(selectedOre), 50);
            }

            return selectedOre;
        }
    }

    return "Stone"; // fallback
}

function getValidOres(ores, event) {
    return ores.filter(ore => {
        const oreEvent = oreData[ore].event;
        if (!oreEvent) return true;       // normal ore
        return oreEvent === event;        // only current event
    });
}
function getEventSafeOres() {
    return Object.keys(oreData).filter(o => {
        const data = oreData[o];

        // Block cave exclusives
        if (data.rarity && data.rarity.includes("CaveExclusive")) return false;

        // Block other events
        if (data.event && data.event !== currentEvent) return false;

        return true;
    });
}
function randomHighTierOre() {
    const ores = Object.keys(oreData).filter(o => oreData[o].exact >= 50000);

    for (let i = ores.length - 1; i >= 0; i--) {
        const ore = ores[i];

        let chance = 1 / (oreData[ore].exact * 50);

        // Apply T7 additive bonus
        if (equippedGears.includes("T7") && gearData.T7) {
            chance += gearData.T7.highTierStack / 10000; 
            // highTierStack max 500 → max 0.05 = +5% additive chance
        }

        if (Math.random() < chance) {
            if (oreData[ore].exact >= 250000 && oreData[ore].spawnMsg) {
                setTimeout(() => tryPlaySpawnSound(ore), 50);
            }
            return ore;
        }
    }

    return ores[0];
}

	function updateCounters() {
    totalBlocksMined = 0;
    globalBlocksMined = 0;

    for (let ore in inventory) {
        const count = inventory[ore] || 0;
        totalBlocksMined += count;

        const data = getOreDataSafe(ore);
        if (!data) continue; // ✅ IMPORTANT: not return

        if (data.exact >= 100000000) {
            globalBlocksMined += count;
        }
    }

    // ✅ Move UI update OUTSIDE the loop
    document.getElementById("totalMined").innerText =
        `Total Mined: ${formatNumber(totalBlocksMined)}`;

    document.getElementById("globalMined").innerText =
        `Global Mined: ${formatNumber(globalBlocksMined)}`;

function costToString(cost) {
    return Object.entries(cost).map(([o, a]) => `${a} ${o}`).join(", ");
}
function canAfford(cost) {
    for (let o in cost) if ((inventory[o] || 0) < cost[o]) return false;
    return true;
}
function spendCost(cost) {
    for (let o in cost) inventory[o] -= cost[o];

function requestUIUpdate(force = false) {
    const now = Date.now();
    const search = document.getElementById("oreSearch").value.trim();

    // If search is active: only update when a new block has been mined (no lag)
    if (search && !force) {
        if (blocksMined === lastUIBlocksMined) return;
        lastUIBlocksMined = blocksMined;
        lastInventoryUpdate = now;
        requestAnimationFrame(() => { updateUI(); updateCounters(); });
        return;

    // No search: normal 1-minute throttle
    if (!force && now - lastInventoryUpdate < INVENTORY_UPDATE_INTERVAL) return;

    lastInventoryUpdate = now;
    lastUIBlocksMined = blocksMined;
    requestAnimationFrame(() => { updateUI(); updateCounters(); });
}

            const invIsKeyword = invKeywords.includes(searchLower) || mutations.some(m => m.name.toLowerCase().startsWith(searchLower) && searchLower.length >= 3);

            // mutation match: "mutations" shows all mutated, or specific mutation name

function getOreDataSafe(oreName) {
    if (oreData[oreName]) return oreData[oreName];

    const base = oreName.split(" [")[0];
    return oreData[base];
}

// Ore Index mutation cycle
const mutationCycleStates = ["Normal", "Inverted", "Glitched", "Voidtouched", "Celestial", "Fractured", "Decayed", "Spectral", "Primordial", "Omnipotent"];
let oreIndexMutationFilter = "Normal";

function cycleOreIndexMutation() {
    const idx = mutationCycleStates.indexOf(oreIndexMutationFilter);
    oreIndexMutationFilter = mutationCycleStates[(idx + 1) % mutationCycleStates.length];
    updateOreIndex();
    updateUI();
}

function updateOreIndex() {
    const indexDiv = document.getElementById("oreIndex");
    const search = document.getElementById("oreSearch").value.toLowerCase().trim();
    const allOres = Object.keys(oreData);
    indexDiv.innerHTML = "";

    const allCaveOres = Object.values(caveTypes).flatMap(cave =>
        [...cave.caveBlocks, ...cave.exclusiveOres].map(x => x.toLowerCase())
    );
    discoveredOres.clear();

    // Precompute owned keys once
    const ownedKeys = new Set(Object.keys(inventory).filter(k => (inventory[k] || 0) > 0));

    // ── Détecte si la recherche cible une mutation ──
    const mutationNames = mutations.map(m => m.name.toLowerCase());
    const specificMut = mutations.find(m =>
        search.length >= 3 && m.name.toLowerCase().startsWith(search)
    );
    const isMutationSearch = search === "mutations" || search === "mutation" || !!specificMut;

    // ── MODE RECHERCHE MUTATION ──
    if (isMutationSearch) {
        const targetMuts = specificMut ? [specificMut] : mutations;

        const rows = [];
        let ownedCount = 0;

        allOres.forEach(ore => {
            const r = oreData[ore];
            targetMuts.forEach(mut => {
                const key = `${ore} [${mut.name}]`;
                const owned = ownedKeys.has(key);
                if (owned) ownedCount++;
                rows.push({ ore, r, mut, mc: mutationColors[mut.name] || "#ff00ff", owned, exact: r.exact * mut.multi });
            });
        });

        rows.sort((a, b) => sortRarestFirst ? b.exact - a.exact : a.exact - b.exact);

        indexDiv.innerHTML = `<h3 style="display:inline">Ore Index (${ownedCount} / ${rows.length} mutations)</h3><br>`;

        rows.forEach(({ ore, r, mut, mc, owned, exact }) => {
            const div = document.createElement("div");
            div.style.fontSize = "13px";
            div.style.padding = "2px 4px";
            div.style.marginBottom = "1px";
            div.style.color = owned ? "lime" : "red";
            let eventTag = "";
            if (r.event) {
                const ec = { space:"#9c27ff", ocean:"#00bfff", fire:"#ff5722", computer:"#00ffcc", nuclear:"#7fff00", evolie:"#cfa26b", mlp:"#ff66cc", terraria:"#66bb6a" };
                eventTag = ` <span style="color:${ec[r.event]||"#fff"};font-weight:bold">[${r.event.toUpperCase()}]</span>`;
            }
            div.innerHTML = `${ore} <span style="color:${mc};font-weight:bold">[${mut.name}]</span> (${r.rarity}) - 1 in ${formatNumber(exact)}${eventTag}`;
            indexDiv.appendChild(div);
        });
        return;
    }

    // ── ORE NAME SEARCH: show base ore + all mutation variants ──
    // Detect if search is a plain ore name (not a keyword)
    const keywords = ["normal","cave","event","mutations","mutation","space","ocean","nuclear","fire","evolie","computer","mlp","terraria","icecave","energycave","normalcave","nuclearcave","shadowcave","abysscave","lavacave"];
    const isKeyword = keywords.includes(search) || mutations.some(m => m.name.toLowerCase().startsWith(search) && search.length >= 3);
    const matchedOres = !isKeyword && search ? allOres.filter(o => o.toLowerCase().includes(search)) : [];

    if (matchedOres.length > 0) {
        let ownedCount = 0;
        const rows = [];

        matchedOres.forEach(ore => {
            const r = oreData[ore];

            if (oreIndexMutationFilter === "Normal") {
                // Normal mode: only show base ore (no mutations)
                const normOwned = ownedKeys.has(ore);
                if (normOwned) ownedCount++;
                rows.push({ ore, r, mut: null, mc: null, owned: normOwned, exact: r.exact });
            } else {
                // Mutation mode: only show that specific mutation variant
                const activeMut = mutations.find(m => m.name === oreIndexMutationFilter);
                if (activeMut) {
                    const key = `${ore} [${activeMut.name}]`;
                    const owned = ownedKeys.has(key);
                    if (owned) ownedCount++;
                    const mc = mutationColors[activeMut.name] || "#ff00ff";
                    rows.push({ ore, r, mut: activeMut, mc, owned, exact: r.exact * activeMut.multi });
                }
            }
        });

        rows.sort((a, b) => sortRarestFirst ? b.exact - a.exact : a.exact - b.exact);
        indexDiv.innerHTML = `<h3 style="display:inline">Ore Index (${ownedCount} / ${rows.length})</h3><br>`;

        rows.forEach(({ ore, r, mut, mc, owned, exact }) => {
            const div = document.createElement("div");
            div.style.fontSize = "13px";
            div.style.padding = "2px 4px";
            div.style.marginBottom = "1px";
            div.style.color = owned ? "lime" : "red";
            const mutTag = mc ? ` <span style="color:${mc};font-weight:bold">[${mut.name}]</span>` : "";
            div.innerHTML = `${ore}${mutTag} (${r.rarity}) - 1 in ${formatNumber(exact)}`;
            indexDiv.appendChild(div);
        });
        return;
    }

    // ── MODE NORMAL / CYCLE MUTATION ──
    const filteredOres = allOres.filter(ore => {
        const r = oreData[ore];
        const eventMatch = r.event && (search === "event" || search === r.event.toLowerCase());
        const caveMatch = allCaveOres.includes(ore.toLowerCase()) && search === "cave";
        const normalMatch = search === "normal" && !r.event && !allCaveOres.includes(ore.toLowerCase());
        // Only use nameMatch / rarityMatch when no keyword is active
        const nameMatch = !isKeyword && ore.toLowerCase().includes(search);
        const rarityMatch = !isKeyword && r.rarity.toLowerCase().includes(search);
        const keep = !search || nameMatch || rarityMatch || eventMatch || caveMatch || normalMatch;
        if (keep) discoveredOres.add(ore);
        return keep;
    });

    const activeMut = mutations.find(m => m.name === oreIndexMutationFilter);
    const activeMc = mutationColors[oreIndexMutationFilter] || "#fff";

    // Précompute un Set de toutes les clés possédées pour ce filtre
    const invKey = (ore) => activeMut ? `${ore} [${oreIndexMutationFilter}]` : ore;
    const isOwned = (ore) => ownedKeys.has(invKey(ore));

    const discoveredCount = filteredOres.filter(ore => isOwned(ore)).length;

    const cycleColor = activeMut ? activeMc : "#fff";
    const cycleLabel = `<span style="color:${cycleColor};cursor:pointer;font-size:11px;margin-left:6px" onclick="cycleOreIndexMutation()">[${oreIndexMutationFilter} ▶]</span>`;
    indexDiv.innerHTML = `<h3 style="display:inline">Ore Index (${discoveredCount} / ${filteredOres.length})</h3>${cycleLabel}<br>`;

    filteredOres.sort((a, b) => {
        const dA = getOreDataSafe(a), dB = getOreDataSafe(b);
        if (!dA || !dB) return 0;
        return sortRarestFirst ? dB.exact - dA.exact : dA.exact - dB.exact;
    }).forEach(ore => {
        const r = oreData[ore];
        const owned = isOwned(ore);

        const div = document.createElement("div");
        div.style.fontSize = "13px";
        div.style.padding = "2px 4px";
        div.style.marginBottom = "1px";
        div.style.cursor = "pointer";

        // Mode Normal → lime/rouge | Mode mutation → couleur mutation/rouge
        div.style.color = owned ? "lime" : "red";

        let eventTag = "";
        if (r.event) {
            const ec = { space:"#9c27ff", ocean:"#00bfff", fire:"#ff5722", computer:"#00ffcc", nuclear:"#7fff00", evolie:"#cfa26b", mlp:"#ff66cc", terraria:"#66bb6a" };
            eventTag = `<span style="color:${ec[r.event]||"#fff"};font-weight:bold;margin-left:6px">[${r.event.toUpperCase()}]</span>`;
        }

        const mutTag = activeMut
            ? ` <span style="color:${activeMc};font-weight:bold">[${oreIndexMutationFilter}]</span>`
            : "";

        const displayExact = activeMut ? r.exact * activeMut.multi : r.exact;
        div.innerHTML = `${ore}${mutTag} (${r.rarity}) - 1 in ${formatNumber(displayExact)}${eventTag}`;
        indexDiv.appendChild(div);
    });
}

function showOreViewer(ore) {

    const mc = mutName ? (mutationColors[mutName] || "#ff00ff") : null;
    const effectiveExact = mut ? data.exact * mut.multi : data.exact;

    oreViewer.style.display = "block";
    oreBlock.innerHTML = "";
    oreBlock.style.outline = "";
    oreBlock.style.boxShadow = "";

    if (oreImages[baseName]) {
        const img = oreImages[baseName].cloneNode();
        img.style.width = "100%";
        img.style.height = "100%";
        img.style.objectFit = "contain";
        if (mc) {
            img.style.outline = `3px solid ${mc}`;
            img.style.filter = `drop-shadow(0 0 6px ${mc})`;
        }
        oreBlock.appendChild(img);
    } else {
        oreBlock.innerText = data.symbol || "";
        oreBlock.style.color = data.symbolColor || "#fff";
        oreBlock.style.background = data.color;
        if (mc) {
            oreBlock.style.outline = `3px solid ${mc}`;
            oreBlock.style.boxShadow = `0 0 10px ${mc}`;
        }
    }

    const mutLabel = mc
        ? ` <span style="color:${mc};font-weight:bold">[${mutName}]</span>`
        : "";
    oreName.innerHTML = `${baseName}${mutLabel} (${data.rarity})`;
    oreRarity.innerText = `1 in ${formatNumber(effectiveExact)}`;

    // Toggle hide if same ore clicked
    if (lastSpawnOre === ore) {
        oreViewer.style.display = "none";
        lastSpawnOre = null;
    } else {
        lastSpawnOre = ore;
    }
}

// Remove invalid ores from inventory (preserves mutated keys)
function sanitizeInventory() {
    for (let ore in inventory) {
        const baseName = ore.split(" [")[0];
        if (!oreData[baseName] && !oreData[ore]) {
            console.warn(`Removed invalid ore from inventory: ${ore}`);
            delete inventory[ore];
        }
    }
}


// Replay button — uses baseName so mutations play the right sound
replaySpawn.onclick = () => {
    if (lastSpawnOre) {
        const baseName = lastSpawnOre.split(" [")[0];
        playSpawnSound(baseName);
    }
};



function saveGame(showAlert = true) {
    localStorage.setItem("MiningRNGSimulator", JSON.stringify({
        inventory,
        ownedPickaxes,
        equippedPickaxe,
        ownedGears,
        equippedGears,
        artefactLevel,
        luckArtefactLevel,
        pauseOnChill,
        waitingForManualHighOre
    }));

    if (showAlert) {
        alert("Game saved!");
    } else {
        console.log("Game auto-saved at " + new Date().toLocaleTimeString());
    }
}

function loadGame() {
    const save = localStorage.getItem("MiningRNGSimulator");
    if (save) {
        const data = JSON.parse(save);
        inventory = data.inventory || {};
        ownedPickaxes = data.ownedPickaxes || ["T0"];
        equippedPickaxe = data.equippedPickaxe || "T0";
        ownedGears = data.ownedGears || [];
        equippedGears = data.equippedGears || [];
        artefactLevel = data.artefactLevel || 0;
        luckArtefactLevel = data.luckArtefactLevel || 0;
        pauseOnChill = data.pauseOnChill || false;
        waitingForManualHighOre = data.waitingForManualHighOre || false;
        currentVolumeIndex = data.currentVolumeIndex ?? 0;

        sanitizeInventory();  // <-- safeguard applied here
        setInterval(updateCaveUI, 1000); 
    } else {
        inventory = {};
        currentVolumeIndex = 0;
    }
}
// ── ACCORDION (mobile only) ──
const accordionState = { pickaxeUI: false, gearUI: false, artefactUI: false, luckArtefactUI: false };

function toggleAccordion(panelId) {
    accordionState[panelId] = !accordionState[panelId];
    const body = document.getElementById("body-" + panelId);
    const arrow = document.getElementById("arrow-" + panelId);
    if (body)  body.classList.toggle("open",  accordionState[panelId]);
    if (arrow) arrow.classList.toggle("open", accordionState[panelId]);
}

function restoreAccordionState() {
    for (const panelId in accordionState) {
        const body  = document.getElementById("body-"  + panelId);
        const arrow = document.getElementById("arrow-" + panelId);
        if (body)  body.classList.toggle("open",  accordionState[panelId]);
        if (arrow) arrow.classList.toggle("open", accordionState[panelId]);
    }
}

document.getElementById("oreSearch").addEventListener("input", updateOreIndex);
loadGame();
document.querySelectorAll("audio").forEach(a => {
    a.volume = volumeLevels[currentVolumeIndex];
});
generateGrid();
updateUI();
draw();
startArtefact();
setInterval(() => {
    saveGame(false); // false = do NOT show alert
}, 300000); // 300000ms = 5 minutes
startEventSystem();
</script>
